<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Employee</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Employee Management</a>
      </div>
    </nav>

    <div class="container">
      <h2 class="text-center mb-4">Add New Employee</h2>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <form action="/add" method="POST">
                <div class="mb-3">
                  <label for="name" class="form-label">Employee Name</label>
                  <input type="text" name="name" id="name" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label for="emp_id" class="form-label">Employee ID</label>
                  <input type="text" name="emp_id" id="emp_id" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label for="phone" class="form-label">Phone</label>
                  <input type="text" name="phone" id="phone" class="form-control">
                </div>

                <div class="mb-3">
                  <label for="address" class="form-label">Address</label>
                  <textarea name="address" id="address" rows="3" class="form-control"></textarea>
                </div>

                <div class="mb-3 form-check">
                  <input type="checkbox" name="working" id="working" class="form-check-input">
                  <label for="working" class="form-check-label">Currently Working</label>
                </div>

                <div class="mb-3">
                  <label for="department" class="form-label">Department</label>
                  <select name="department" id="department" class="form-select">
                    <option value="CSE">Computer Science</option>
                    <option value="ME">Mechanical Engineering</option>
                    <option value="EE">Electrical Engineering</option>
                  </select>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-success">Add Employee</button>
                </div>
              </form>
            </div>
          </div>

          {% if message %}
            <div class="alert alert-success mt-3 text-center">{{ message }}</div>
          {% endif %}
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
