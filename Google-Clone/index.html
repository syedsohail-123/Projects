<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #202124;
            background-color: #fff;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 30px;
            font-size: 14px;
        }

        header nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header nav a {
            color: #202124;
            text-decoration: none;
            padding: 5px 10px;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        .apps-icon {
            width: 24px;
            height: 24px;
            fill: #5f6368;
            cursor: pointer;
        }

        .sign-in {
            background-color: #1a73e8;
            color: white;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .sign-in:hover {
            background-color: #1b66c9;
            box-shadow: 0 1px 3px rgba(66, 133, 244, 0.3);
            text-decoration: none;
        }

        /* Main Content Styles */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 150px;
            padding-bottom: 100px;
        }

        .google-logo {
            width: 272px;
            margin-bottom: 30px;
        }

        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 15px 50px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            outline: none;
            font-size: 16px;
            transition: box-shadow 200ms;
        }

        .search-box:hover, .search-box:focus {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            border-color: rgba(223, 225, 229, 0);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 16px;
            width: 20px;
            height: 20px;
            color: #9aa0a6;
        }

        .voice-icon, .camera-icon {
            position: absolute;
            right: 16px;
            top: 16px;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .voice-icon {
            right: 50px;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .search-button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .search-button:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .language-links {
            font-size: 13px;
        }

        .language-links a {
            color: #1a0dab;
            text-decoration: none;
            padding: 0 3px;
        }

        .language-links a:hover {
            text-decoration: underline;
        }

        /* Footer Styles */
        footer {
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        .footer-header {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
            color: #70757a;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 0 20px;
        }

        .footer-group {
            display: flex;
            padding: 15px 0;
        }

        .footer-group a {
            color: #70757a;
            text-decoration: none;
            padding: 0 15px;
        }

        .footer-group a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .google-logo {
                width: 200px;
            }

            main {
                padding-top: 100px;
            }

            .footer-links {
                flex-direction: column;
                align-items: center;
            }

            .footer-group {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 15px;
            }

            .search-container {
                width: 90%;
            }

            .buttons {
                flex-direction: column;
                gap: 10px;
            }

            .footer-group {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <svg class="apps-icon" viewBox="0 0 24 24">
                <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path>
            </svg>
            <a class="sign-in" href="#">Sign in</a>
        </nav>
    </header>

    <main>
        <svg class="google-logo" viewBox="0 0 272 92">
            <path fill="#4285F4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
            <path fill="#EA4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
            <path fill="#FBBC05" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.09 21.25-22.09 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
            <path fill="#34A853" d="M225 3v65h-9.5V3h9.5z"/>
            <path fill="#EA4335" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
            <path fill="#4285F4" d="M35.29 41.41V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.3.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 10.78-24.7 24.46 0 13.68 10.84 24.46 24.7 24.46 8.81 0 14.26-3.61 17.93-8.22 2.3-2.86 3.8-6.72 4.37-11.18l-22.49.01z"/>
        </svg>

        <div class="search-container">
            <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
            </svg>
            <input type="text" class="search-box" id="search-input" placeholder="Search Google or type a URL">
            <svg class="voice-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"></path>
            </svg>
            <svg class="camera-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
            </svg>
        </div>

        <div class="buttons">
            <button class="search-button" id="google-search">Google Search</button>
            <button class="search-button" id="feeling-lucky">I'm Feeling Lucky</button>
        </div>

        <div class="language-links">
            Google offered in: <a href="#">Español</a> <a href="#">Français</a> <a href="#">中文</a>
        </div>
    </main>

    <footer>
        <div class="footer-header">United States</div>
        <div class="footer-links">
            <div class="footer-group">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-group">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Search functionality
            const searchInput = document.getElementById('search-input');
            const googleSearchBtn = document.getElementById('google-search');
            const feelingLuckyBtn = document.getElementById('feeling-lucky');

            function performSearch(query, lucky = false) {
                if (query.trim() === '') return;
                
                if (lucky) {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI`;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }

            // Handle search button click
            googleSearchBtn.addEventListener('click', function() {
                performSearch(searchInput.value);
            });

            // Handle "I'm Feeling Lucky" button click
            feelingLuckyBtn.addEventListener('click', function() {
                performSearch(searchInput.value, true);
            });

            // Handle pressing Enter key in search box
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch(searchInput.value);
                }
            });

            // Add focus to search box on page load
            searchInput.focus();
        });
    </script>
</body>
</html>
