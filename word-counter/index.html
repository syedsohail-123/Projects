<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter</title>
  <style>
    body {
      padding: 50px 100px;
    }
    h1 {
      text-align: center;
      background-color: #006780;
      color: white;
      padding: 10px;
      margin: 0px;
    }
    #textbox {
      width: 99.3%;
      border-color: #006780;
      padding: 10px;
      font-size: 16px;
    }
    p {
      text-align: center;
      background-color: #006780;
      font-size: 20px;
      color: white;
      padding: 10px;
      margin: 0px;
    }
  </style>
</head>
<body>
  <h1>Word and Character Counter</h1>
  <textarea id="textbox" cols="30" rows="10"></textarea>
  <p>
    <span id="word">0</span> words and
    <span id="char">0</span> characters
  </p>  

  <script>
    let textbox = document.getElementById("textbox")
    textbox.addEventListener('input', function(){
      let text = this.value
      let char = text.length
      document.getElementById("char").innerText = char

      text = text.trim();
      let words = text.split(" ");
      let cleanList = words.filter(function(elm) {
        return elm !== "";
      })

      document.getElementById("word").innerText = cleanList.length;
    })
  </script>  
</body>
</html>
